<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <h1>REGISTRATION FORM</h1>
        <table>
            <tr>
                <td><label for="name">Frist Name: </label></td>
                <td><input type="text" id="name" name="name" placeholder="Nhập tên của bạn"></td>
            </tr>
            <tr>
                <td><label for="lastname">Last Name: </label></td>
                <td><input type="text" id="lastname" name="lastname" placeholder="Nhập họ của bạn"></td>
            </tr>
            <tr>
                <td><label for="phone">Phone: </label></td>
                <td><input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại của bạn"></td>
            </tr>
            <tr>
                <td><label for="email">Email: </label></td>
                <td><input type="email" id="email" name="email" placeholder="Nhập email của bạn"></td>
            </tr>
            <tr>
                <td><label for="password">Password: </label></td>
                <td><input type="password" id="password" name="password" placeholder="Nhập mật khẩu của bạn"></td>
            </tr>
            <tr>
                <td><label for="gender">Gender: </label></td>
                <td>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label> 
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </td> 
                </tr>
            <tr>
                <td>
                    <label for="age"> Age</label>
                    <input type="number" id="age" name="age" placeholder="Nhập tuổi của bạn">
                </td>
            </tr>
        </tr>
        <tr>
            <td>
                <label for="preferences">Preferences: </label>
            </td>
            <tr>
                 <td>
                    <input type="checkbox" id="arcylic-painting">
                    <label for="arcylic-painting">Arcylic Painting</label>
             </td>
            </tr>
            <tr>
                <td>
                <input type="checkbox" id="Oil-painting">
                <label for="Oil-painting">Oil Painting</label>
                </td>
            </tr>
            <tr>
                <td>
                <input type="checkbox" id="warers color paining">
                <label for="warers color paining">Warers Color Paining</label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for=""> Select occupation</label>
                    <select name="occupation" id="occupation">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="engineer">Engineer</option>
                        <option value="doctor">Doctor</option>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="bio">Bio: </label>
                    <textarea placeholder="Nhập thông tin về bạn"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    

    </form>
</body>
</html>
