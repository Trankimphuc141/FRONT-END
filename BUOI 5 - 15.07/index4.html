<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{ /*cha*/
            width: 100px;
            height: 100px;
            border: 10px solid yellowgreen; /*kích thước - đường viền - màu*/
            margin: 10px 20px; /*kích thước tách - trên dưới: 10 px, trái phải 20px*/
            padding: 10px; /* margin là bên ngoài, padding: từ bên trong vào*/
            border-radius: 999px; /*999 là bo tròn*/
        }
        .box1{/*con*/
            background-color: aqua;
        }
        .box2{
            background: red;
        }
        .box3{
            background: green;
        }
    </style>
</head>
<body>
    <div class="box box1">box1</div>
    <div class="box box2">box2</div>
    <div class="box box3">box3</div>
</body>
</html>
